function drawEffectSprite(classId, stage) {
  const canvas = document.getElementById('effectCanvas');
  if (!canvas) { console.warn('EFFECT: no canvas'); return; }
  const ctx = canvas.getContext('2d');
  const stageMap = {1:1, 2:2, 3:3, 4:4, 5:6};
  const effIdx = stageMap[stage] || stage;
  const img = effectSprites[classId + '_' + effIdx] || effectSprites[classId + '_' + stage] || effectSprites[classId + '_1'];
  if (!img || !img.complete || !img.naturalWidth) { console.warn('EFFECT: img not loaded', classId, stage, effIdx, img?.src); return; }
  if (effectAnimId) cancelAnimationFrame(effectAnimId);
  const startX = canvas.width * 0.18;
  const startY = classId === 'archer' ? canvas.height * 0.55 : classId === 'rogue' ? canvas.height * 0.48 : canvas.height * 0.4;
  const endX = canvas.width * 0.72;
  const endY = classId === 'archer' ? canvas.height * 0.5 : classId === 'rogue' ? canvas.height * 0.43 : canvas.height * 0.35;
  const size = classId === 'archer' ? 14 : classId === 'rogue' ? 50 : 80;
  const totalMs = 300;
  const totalFrames = Math.round(totalMs / 16);
  let t = 0;
  const effectSeed = Math.random() * Math.PI * 2;
  function drawFrame() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    t += 1 / totalFrames;
    if (t > 1.3) {
      effectAnimId = null;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      return;
    }
    const travel = Math.min(t, 1);
    const eased = 1 - Math.pow(1 - travel, 3);
    const x = startX + (endX - startX) * eased;
    const yOffset = classId === 'archer' ? (Math.sin(t * 8 + effectSeed) * 12) : 0;
    const y = startY + (endY - startY) * eased + yOffset;
    let scale, alpha;
    if (t <= 1) {
      scale = 0.5 + eased * 0.5;
      alpha = 0.7 + eased * 0.3;
    } else {
      const fade = (t - 1) / 0.5;
      scale = 1 + fade * 0.3;
      alpha = 1 - fade;
    }
    const s = size * scale;
    const iw = img.naturalWidth || 1;
    const ih = img.naturalHeight || 1;
    const ratio = iw / ih;
    const dh = s;
    const dw = s * ratio;
    ctx.globalAlpha = Math.max(0, alpha);
    ctx.drawImage(img, x - dw/2, y - dh/2, dw, dh);
    ctx.globalAlpha = 1;
    effectAnimId = requestAnimationFrame(drawFrame);
  }
  effectAnimId = requestAnimationFrame(drawFrame);
}

function upgradeSkill(id) {
  const sk = SKILLS.find(s => s.id === id);
  const lv = G.skillLevels[id] || 0;
  const cost = Math.ceil(sk.costBase * Math.pow(sk.costScale, lv) * ss('skillCostMul',1));
  const lvCap = getLevel() + 50;
  if (G.gold < cost || lv >= sk.maxLv || lv >= lvCap) return;
  G.gold -= cost;
  G.skillLevels[id] = lv + 1;

  saveCloudGame();

function upgradeAllSkills() {
  let upgraded = 0;
  const lvCap = getLevel() + 50;
  for (let safe = 0; safe < 1000; safe++) {
    let any = false;
    for (const sk of SKILLS) {
      const lv = G.skillLevels[sk.id] || 0;
      const cost = Math.ceil(sk.costBase * Math.pow(sk.costScale, lv) * ss('skillCostMul',1));
      if (G.gold >= cost && lv < sk.maxLv && lv < lvCap) {
      G.gold -= cost;
      G.skillLevels[sk.id] = lv + 1;
      upgraded++;
      any = true;
      }
    }
    if (!any) break;
  }
  if (upgraded > 0) showFloatText(`⚡ 스킬 ${upgraded}회 강화!`, '#7f5af0');
  updateAllUI();
}

function getEnhanceCost(item) {
  const enhLv = item.enhanceLevel || 0;
  const ri = RARITIES.findIndex(r => r.id === item.rarityId);
  const rarityMul = [1, 3, 8, 20, 50, 150, 300, 500, 800, 1200, 2000][ri] || 1;
  return Math.ceil(100 * Math.pow(2, enhLv) * rarityMul);
}

  updateAllUI();
  showItemPopup(item);
  saveCloudGame();
}
let fusionSlot1 = null; // item id
let fusionSlot2 = null;
let fusionPickingSlot = 0; // 0=none, 1=slot1, 2=slot2
function fuseItems(item1Id, item2Id) {
  const item1 = G.inventory.find(i => i.id === item1Id);
  const item2 = G.inventory.find(i => i.id === item2Id);
  if (!item1 || !item2) return null;
  if (item1.rarityId !== item2.rarityId || item1.slot !== item2.slot) return null;
  const n1 = (item1.name||'').replace(/ S\+?$| SS\+?$| SSS$/,'');
  const n2 = (item2.name||'').replace(/ S\+?$| SS\+?$| SSS$/,'');
  if (n1 !== n2) { showFloatText('같은 이름의 장비만 합성 가능!', '#e74c3c'); return null; }
  const currentIdx = RARITIES.findIndex(r => r.id === item1.rarityId);
  if (currentIdx >= RARITIES.length - 1) return null;
  const nextRarity = RARITIES[currentIdx + 1];
  const fusionCost = Math.ceil(100 * Math.pow(currentIdx + 1, 2));
  if (G.gold < fusionCost) { showFloatText('💰 골드가 부족합니다!', '#e74c3c'); return null; }
  G.gold -= fusionCost;
  Object.keys(G.equipment).forEach(slot => {
    if (G.equipment[slot] && (G.equipment[slot].id === item1Id || G.equipment[slot].id === item2Id)) {
      G.equipment[slot] = null;
    }
  });
  G.inventory = G.inventory.filter(i => i.id !== item1Id && i.id !== item2Id);
  const slot = EQUIP_SLOTS.find(s => s.id === item1.slot);
  const nameMap = SLOT_NAMES[slot.id];
  const fusionRarityBase = nextRarity.id.startsWith('mythic') ? 'mythic' : nextRarity.id;
  const fusionNames = nameMap[fusionRarityBase] || nameMap['common'];
  const nameIdx = Math.floor(Math.random() * fusionNames.length);
  let baseStat;
  if (slot.statType === 'crit') {
    baseStat = (1 + G.stage * 0.3) * nextRarity.statMul * (0.9 + Math.random() * 0.2);
  } else if (slot.statType === 'critDmg') {
    baseStat = (3 + G.stage * 0.8) * nextRarity.statMul * (0.9 + Math.random() * 0.2);
  } else if (slot.statType === 'spd') {
    baseStat = (2 + G.stage * 0.5) * nextRarity.statMul * (0.9 + Math.random() * 0.2);
  } else if (slot.statType === 'hp') {
    baseStat = (10 + G.stage * 5) * nextRarity.statMul * (0.9 + Math.random() * 0.2);
  } else {
    baseStat = (5 + G.stage * 2) * nextRarity.statMul * (0.9 + Math.random() * 0.2);
  }
  const STAT_LABELS = { atk:'공격력', hp:'HP', crit:'치명타%', critDmg:'치명타피해%', spd:'공격속도%' };
  const MYTHIC_SUFFIX = { mythic_s:' S', mythic_sp:' S+', mythic_ss:' SS', mythic_ssp:' SS+', mythic_sss:' SSS' };
  const fusionDisplayName = fusionNames[nameIdx] + (MYTHIC_SUFFIX[nextRarity.id] || '');
  const newItem = {
    id: nextItemId++,
    slot: item1.slot,
    rarityId: nextRarity.id,
    rarity: nextRarity.name,
    color: nextRarity.color,
    name: fusionDisplayName,
    icon: slot.icon,
    sprite: getEquipSprite(slot.id, nextRarity.id, nameIdx),
    statType: slot.statType,
    statValue: Math.ceil(baseStat),
    statLabel: STAT_LABELS[slot.statType] || slot.statType,
    enhanceLevel: 0,
  };
  G.inventory.push(newItem);
  return newItem;
}
function doFusion() {
  if (!fusionSlot1 || !fusionSlot2) return;
  const result = fuseItems(fusionSlot1, fusionSlot2);
  fusionSlot1 = null;
  fusionSlot2 = null;
  fusionPickingSlot = 0;
  if (result) {
    showFloatText(`🔮 합성 성공! ${result.rarity} ${itemName(result)}!`, result.color);
    updateAllUI();
    showItemPopup(result);
  } else {
    updateAllUI();
  }
}
function autoFuseAll() {
  let totalFused = 0;
  let keepGoing = true;
  while (keepGoing) {
    keepGoing = false;
    const groups = {};
    G.inventory.forEach(item => {
      const baseName = (item.name || '').replace(/ S\+?$| SS\+?$| SSS$/,'');
      const key = item.slot + '_' + item.rarityId + '_' + baseName;
      if (!groups[key]) groups[key] = [];
      groups[key].push(item);
    });
    for (const key of Object.keys(groups)) {
      const items = groups[key];
      if (items.length >= 2) {
      const ridx = RARITIES.findIndex(r => r.id === items[0].rarityId);
      if (ridx >= RARITIES.length - 1) continue;
      const cost = Math.ceil(100 * Math.pow(ridx + 1, 2));
      if (G.gold < cost) continue;
      const result = fuseItems(items[0].id, items[1].id);
      if (result) {
      totalFused++;
      keepGoing = true; // Check again, new item might pair with another
      break; // Restart loop since inventory changed
      }
      }
    }
  }
  if (totalFused > 0) {
    showFloatText(`🔮 일괄 합성 ${totalFused}회 완료!`, '#7f5af0');
  } else {
    showFloatText('합성 가능한 장비가 없습니다', '#e74c3c');
  }
  fusionSlot1 = null;
  fusionSlot2 = null;
  updateAllUI();
}

  if (fusionPickingSlot === 1) {

  } else if (fusionPickingSlot === 2) {

    if (fusionSlot1 === itemId) fusionSlot1 = null;

}

function buySSPackage() {
  if (G.gold < 999000000) { showFloatText('💰 골드가 부족합니다!', '#e74c3c'); return; }
  if (!confirm('999M 골드로 신화 SS 풀세트를 구매하시겠습니까?')) return;
  G.gold -= 999000000;
  const ssRarity = RARITIES.find(r => r.id === 'mythic_ss');
  EQUIP_SLOTS.forEach(slot => {
    const nameMap = SLOT_NAMES[slot.id];
    const names = nameMap['mythic'] || nameMap['common'];
    const nameIdx = Math.floor(Math.random() * names.length);
    const STAT_LABELS = { atk:'공격력', hp:'HP', crit:'치명타%', critDmg:'치명타피해%', spd:'공격속도%' };
    let baseStat;
    if (slot.statType === 'crit') baseStat = (1 + G.stage * 0.3) * ssRarity.statMul;
    else if (slot.statType === 'critDmg') baseStat = (3 + G.stage * 0.8) * ssRarity.statMul;
    else if (slot.statType === 'spd') baseStat = (2 + G.stage * 0.5) * ssRarity.statMul;
    else baseStat = (5 + G.stage * 2) * ssRarity.statMul;
    const item = {
      id: nextItemId++, slot: slot.id, rarityId: 'mythic_ss', rarity: '신화 SS',
      color: ssRarity.color, name: names[nameIdx] + ' SS', icon: slot.icon,
      sprite: getEquipSprite(slot.id, 'mythic_ss', nameIdx),
      statType: slot.statType, statValue: Math.ceil(baseStat),
      statLabel: STAT_LABELS[slot.statType] || slot.statType, enhanceLevel: 0,
    };
    G.inventory.push(item);
  });
  showFloatText('🔥 신화 SS 풀세트 획득!', '#ff4444');
  updateAllUI();
  saveCloudGame();
}

function renderFusion(el, headerHtml) {
  const item1 = fusionSlot1 ? G.inventory.find(i => i.id === fusionSlot1) : null;
  const item2 = fusionSlot2 ? G.inventory.find(i => i.id === fusionSlot2) : null;
  if (fusionSlot1 && !item1) fusionSlot1 = null;
  if (fusionSlot2 && !item2) fusionSlot2 = null;
  const canFuse = item1 && item2 && item1.rarityId === item2.rarityId && item1.slot === item2.slot;
  const currentIdx = item1 ? RARITIES.findIndex(r => r.id === item1.rarityId) : -1;
  const isMaxRarity = currentIdx >= RARITIES.length - 1;
  const fusionCost = canFuse ? Math.ceil(100 * Math.pow(currentIdx + 1, 2)) : 0;
  const nextRarity = canFuse && !isMaxRarity ? RARITIES[currentIdx + 1] : null;
  let slot1Html = item1 ?
    `<div class="fusion-slot filled rarity-${item1.rarityId}" onclick="selectFusionSlot(1)">
      <div class="fs-icon">${item1.icon}</div>
      <div class="fs-name" style="color:${item1.color}">${itemName(item1)}</div>
      <div class="fs-rarity" style="color:${item1.color}">${item1.rarity}</div>
    </div>` :
    `<div class="fusion-slot" onclick="selectFusionSlot(1)"><div class="fs-empty">선택</div></div>`;
  let slot2Html = item2 ?
    `<div class="fusion-slot filled rarity-${item2.rarityId}" onclick="selectFusionSlot(2)">
      <div class="fs-icon">${item2.icon}</div>
      <div class="fs-name" style="color:${item2.color}">${itemName(item2)}</div>
      <div class="fs-rarity" style="color:${item2.color}">${item2.rarity}</div>
    </div>` :
    `<div class="fusion-slot" onclick="selectFusionSlot(2)"><div class="fs-empty">선택</div></div>`;
  let resultHtml = '';
  if (canFuse && nextRarity) {
    resultHtml = `<div class="fusion-result">
      <div style="font-size:12px;color:var(--dim);margin-bottom:4px;">결과</div>
      <div style="font-size:16px;font-weight:700;color:${nextRarity.color};">${nextRarity.name} 등급 장비</div>
      <div style="font-size:11px;color:var(--dim);margin-top:4px;">비용: 💰 ${formatNum(fusionCost)}</div>
    </div>
    <button class="fusion-btn" onclick="doFusion()" ${G.gold < fusionCost || isMaxRarity ? 'disabled' : ''}>🔮 합성하기</button>`;
  } else if (canFuse && isMaxRarity) {
    resultHtml = `<div class="fusion-result"><div style="color:var(--red);font-size:13px;">이미 최고 등급입니다!</div></div>`;
  } else if (item1 && item2) {
    resultHtml = `<div class="fusion-result"><div style="color:var(--red);font-size:13px;">같은 등급, 같은 부위의 장비 2개가 필요합니다</div></div>`;
  }
  let pickListHtml = '';
  if (fusionPickingSlot > 0) {
    const otherItem = fusionPickingSlot === 1 ? item2 : item1;
    let candidates = [...G.inventory];
    if (otherItem) {
      candidates = candidates.filter(i => i.rarityId === otherItem.rarityId && i.slot === otherItem.slot && i.id !== otherItem.id);
    }
    candidates.sort((a, b) => {
      const ai = RARITIES.findIndex(r => r.id === a.rarityId);
      const bi = RARITIES.findIndex(r => r.id === b.rarityId);
      return bi - ai;
    });
    candidates = candidates.filter(i => {
      const ri = RARITIES.findIndex(r => r.id === i.rarityId);
      return ri < RARITIES.length - 1;
    });
    if (candidates.length > 0) {
      pickListHtml = `<div style="font-size:13px;font-weight:700;margin:12px 0 8px;">🎒 장비 선택 (슬롯 ${fusionPickingSlot})</div>
      <div class="fusion-pick-list">
      ${candidates.map(item => `
      <div class="fusion-pick-item rarity-${item.rarityId}" onclick="pickFusionItem(${item.id})">
      <div class="item-icon">${getEquipIcon(item)}</div>
      <div class="item-name" style="color:${item.color}">${itemName(item)}</div>
      <div class="item-stat" style="color:${item.color}">${item.rarity}</div>
      </div>
      `).join('')}
      </div>`;
    } else {
      pickListHtml = `<div style="text-align:center;color:var(--dim);padding:20px;font-size:13px;">합성 가능한 장비가 없습니다</div>`;
    }
  }
  el.innerHTML = (headerHtml || '') + `
    <div class="fusion-section">
      <div class="fusion-title">🔮 장비 합성</div>
      <div style="text-align:center;font-size:11px;color:var(--dim);margin-bottom:8px;">같은 등급 + 같은 부위 = 상위 등급 장비!</div>
      <div style="text-align:center;margin-bottom:12px;">

      </div>
      <div class="fusion-slots">
      ${slot1Html}
      <div class="fusion-plus">+</div>
      ${slot2Html}
      </div>
      ${resultHtml}
      ${(fusionSlot1 || fusionSlot2) ? `<div style="text-align:center;margin-top:8px;"><button style="background:none;border:1px solid var(--dim);color:var(--dim);padding:6px 16px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:11px;" onclick="clearFusionSlots()">초기화</button></div>` : ''}
      ${pickListHtml}
      <div style="margin-top:16px;font-size:11px;color:var(--dim);text-align:center;">
      등급: ${RARITIES.map(r => `<span style="color:${r.color}">${r.name}</span>`).join(' → ')}
      </div>
    </div>
  `;
}
function getSaveKey() {
  return currentUser ? 'idle_save_' + currentUser.uid : 'idle_save_guest';
}
function saveGame() {
  const data = { ...G, monster: null, lastSave: Date.now() };
  localStorage.setItem(getSaveKey(), JSON.stringify(data));
}
function loadGame() {
  try {
    if (!localStorage.getItem('_reset_done_v3')) {
      localStorage.clear();
      localStorage.setItem('_reset_done_v3', '1');
      return;
    }
    const raw = localStorage.getItem(getSaveKey());
    if (!raw) return;
    const data = JSON.parse(raw);
    delete data.ownedHeroes; delete data.selectedHeroId; delete data.companions; delete data.charLampLevel;
    Object.assign(G, data);
    G.monster = null;
    if (!G.unlockedClasses) G.unlockedClasses = ['knight'];
    if (!G.selectedClass || !CLASSES[G.selectedClass]) G.selectedClass = 'knight';
    if (!G.classLevels) G.classLevels = { knight: 1, archer: 1, rogue: 1 };
    if (!G.classXp) G.classXp = { knight: 0, archer: 0, rogue: 0 };
    if (!G.classStages) { G.classStages = { knight: G.stage||1, archer: 1, rogue: 1 }; G.classSubStages = { knight: G.subStage||1, archer: 1, rogue: 1 }; G.classMaxStages = { knight: G.maxStage||1, archer: 1, rogue: 1 }; }
    const allItems = [...G.inventory, ...Object.values(G.equipment).filter(Boolean)];
    if (allItems.length > 0) nextItemId = Math.max(...allItems.map(i => i.id)) + 1;
    const offlineMs = Date.now() - (data.lastSave || Date.now());
    const offlineSec = Math.min(offlineMs / 1000, 8 * 3600);
    if (offlineSec > 60) {
      const stats = getPlayerStats();
      const dps = stats.atk * stats.spdBonus;
      const offlineGold = Math.ceil(dps * offlineSec * 0.3 * getMonsterGold(G.stage) / getMonsterHp(G.stage));
      if (offlineGold > 0) {
      G.gold += offlineGold;
      G.totalGold += offlineGold;
      const min = Math.floor(offlineSec / 60);
      setTimeout(() => alert(`⏰ ${min}분 동안 방치 보상!\n💰 ${formatNum(offlineGold)} 골드 획득!`), 500);
      }
    }
  } catch(e) { console.warn('Load failed', e); }
}
document.querySelector('.tab-bar').addEventListener('click', (e) => {

  if (!btn) return;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeTab = btn.dataset.tab;
  renderTab(activeTab);
});
let lastTick = Date.now();
function gameLoop() {
  const now = Date.now();
  const dt = now - lastTick;
  G.attackTimer += dt;
  if (G.attackTimer >= G.attackSpeed) {
    G.attackTimer -= G.attackSpeed;
    attack();
  }
  lastTick = now;
  requestAnimationFrame(gameLoop);
}

async function onGoogleLogin(response) {
  const errEl = document.getElementById('nickError');
  errEl.textContent = '로그인 중...'; errEl.style.display = ''; errEl.style.color = '#4fc3f7';
  try {
    const res = await fetch('/api/google-login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ credential: response.credential })
    });
    const data = await res.json();
    if (data.error) { errEl.textContent = data.error; errEl.style.color = '#ff4444'; return; }
    localStorage.setItem('userUid', data.uid);
    localStorage.setItem('userNick', data.nickname);
    localStorage.setItem('userEmail', data.email || '');
    localStorage.setItem('isAdmin', data.is_admin ? 'true' : 'false');
    userUid = data.uid;
    errEl.textContent = '✅ 로그인 완료!'; errEl.style.color = '#4CAF50';
    setTimeout(() => location.reload(), 300);
  } catch(e) {
    errEl.textContent = '로그인 실패: ' + e.message; errEl.style.color = '#ff4444';
  }
}
function authFetch(url, opts = {}, timeout = 10000) {
  const ctrl = new AbortController();
  setTimeout(() => ctrl.abort(), timeout);
  opts.headers = { ...(opts.headers || {}), ...authHeaders() };
  opts.signal = ctrl.signal;
  return fetch(url, opts);
}
async function doRegister() {
  const nick = document.getElementById('nickInput').value.trim();
  const errEl = document.getElementById('nickError');
  if (!nick || nick.length < 2 || nick.length > 12) {
    errEl.textContent = '닉네임은 2~12자로 입력해주세요'; errEl.style.display = ''; return;
  }
  errEl.style.display = 'none';
  errEl.textContent = '등록 중...'; errEl.style.display = ''; errEl.style.color = '#4fc3f7';
  try {
    const res = await fetch('/api/register', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ nickname: nick })
    });
    const data = await res.json();
    if (data.error) { errEl.textContent = data.error; errEl.style.color = '#ff4444'; return; }
    localStorage.clear();
    localStorage.setItem('userUid', data.uid);
    localStorage.setItem('userNick', data.nickname);
    localStorage.setItem('isAdmin', data.is_admin ? 'true' : 'false');
    userUid = data.uid;
    errEl.textContent = '✅ 등록 완료!'; errEl.style.color = '#4CAF50';
    setTimeout(() => location.reload(), 300);
  } catch(e) {
    errEl.textContent = '서버 연결 실패 — 잠시 후 다시 시도해주세요';
    errEl.style.color = '#ff4444';
  }
}

async function syncWithServer() {
  try {
    const res = await fetch('/api/auto-login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ uid: userUid })
    });
    let data = await res.json();
    if (!data.ok) {
      const nick = localStorage.getItem('userNick') || '모험가';
      try {
      await fetch('/api/register', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ nickname: nick })
      });
      } catch(e) {}
      return;
    }
    if (data.ok) {
      localStorage.setItem('userNick', data.nickname);
      localStorage.setItem('isAdmin', data.is_admin ? 'true' : 'false');
      currentUser.name = data.nickname;
      isAdmin = data.is_admin;
      document.getElementById('userName').textContent = data.nickname;
      if (isAdmin && !document.querySelector('[data-tab="admin"]')) {
      const btn = document.createElement('button');
      btn.className = 'tab-btn';
      btn.dataset.tab = 'admin';
      btn.innerHTML = '<span class="tab-icon">🔧</span>관리자';
      document.querySelector('.tab-bar').appendChild(btn);
      }
      const loadRes = await authFetch('/api/load');
      const loadData = await loadRes.json();
      if (loadData && loadData.gameState) {
      const saved = typeof loadData.gameState === 'string' ? JSON.parse(loadData.gameState) : loadData.gameState;
      if (saved && Object.keys(saved).length > 2) {
      const cloudStage = Math.max(...Object.values(saved.classMaxStages || {knight:1}));
      const localStage = Math.max(...Object.values(G.classMaxStages || {knight:1}));
      if (cloudStage > localStage || (cloudStage === localStage && (saved.gold||0) > G.gold)) {
      for (const key of Object.keys(saved)) G[key] = saved[key];
      G.monster = null;
      spawnMonster();
      updateAllUI();
      }
      }
      }
      await loadServerSettings();
    }
  } catch(e) {
  }
}

async function _doCloudSave() {

      knightStage: (G.classMaxStages||{}).knight || 0,

function getCombatPower() {
  let equipAtk = 0, equipCrit = 0, equipCritDmg = 0, equipSpd = 0;
  Object.values(G.equipment).forEach(item => {
    if (!item) return;
    const enhMul = 1 + (item.enhanceLevel || 0) * 0.1;
    const val = item.statValue * enhMul;
    if (item.statType === 'atk') equipAtk += val;
    if (item.statType === 'crit') equipCrit += val;
    if (item.statType === 'critDmg') equipCritDmg += val;
    if (item.statType === 'spd') equipSpd += val;
  });
  const cp = Math.floor(
    equipAtk * 2.0 +
    equipCrit * 50 +
    equipCritDmg * 30 +
    equipSpd * 40 +
    getLevel() * 10
  );
  return cp;
}
function updateCombatPower() {
  const cp = getCombatPower();
  const el = document.getElementById('combatPower');
  if (el) el.textContent = formatNum(cp);

async function sbGet(path) { const r = await fetch(SB_URL+path, {headers:SB_HDR}); return r.json(); }
async function sbPost(path, body) { const r = await fetch(SB_URL+path, {method:'POST',headers:SB_HDR,body:JSON.stringify(body)}); return r; }
async function sbPatch(path, body) { const r = await fetch(SB_URL+path, {method:'PATCH',headers:{...SB_HDR,'Prefer':'return=minimal'},body:JSON.stringify(body)}); return r; }
async function addPending(uid, field, amount) {
  const res = await sbGet('/user_settings?select=uid,settings&uid=eq.'+uid);
  const settings = (res[0] && res[0].settings) || {};
  const pending = settings.pending_give || {};
  pending[field] = (pending[field] || 0) + amount;
  settings.pending_give = pending;
  await sbPost('/user_settings', {uid, settings});
}
async function giveToAllUsers(field, amount) {
  if (!confirm(`모든 유저에게 ${field === 'gold' ? '💰골드' : '💎보석'} +${formatNum(amount)} 지급?`)) return;
  showFloatText(`⏳ 전체 지급 중...`, '#f1c40f');
  try {
    const users = await sbGet('/saves?select=uid');
    let ok = 0;
    for (const u of users) {
      await addPending(u.uid, field, amount);
      ok++;
    }
    G[field] = (G[field] || 0) + amount;
    updateTopBar();
    showFloatText(`✅ ${ok}명에게 ${field === 'gold' ? '💰' : '💎'}+${formatNum(amount)} 지급 완료!`, '#4CAF50');
  } catch(e) { showFloatText('❌ 지급 실패: ' + e.message, '#ff4444'); }
}
async function giveToUser(field, amount) {
  const uid = document.getElementById('targetUid').value;
  if (!uid) { alert('대상 UID를 선택하세요'); return; }
  try {
    await addPending(uid, field, amount);
    if (uid === currentUser.uid) { G[field] = (G[field] || 0) + amount; updateTopBar(); }
    showFloatText(`✅ ${field === 'gold' ? '💰' : '💎'}+${formatNum(amount)} 지급 완료!`, '#4CAF50');
  } catch(e) { showFloatText('❌ 지급 실패: ' + e.message, '#ff4444'); }
}
async function setUserSetting(key, val) {
  const uid = document.getElementById('targetUid').value;
  if (!uid) { alert('대상 UID를 선택하세요'); return; }
  try {
    const res = await authFetch('/api/user-settings/' + uid, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ [key]: val })
    });
    showFloatText('✅ ' + key + ' = ' + val + ' 적용!', '#4CAF50');
  } catch(e) { alert('설정 실패: ' + e.message); }
}
async function saveMyUserSetting(key, val) {
  if (!currentUser) return;
  userSettings[key] = val;
  await authFetch('/api/user-settings/' + currentUser.uid, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify(userSettings)
  });
  showFloatText('✅ 내 ' + key + ' = ' + val + ' 적용!', '#4fc3f7');
}
async function resetGame() {
  if (!confirm('정말 게임을 완전 초기화 하시겠습니까?\n로컬 + 클라우드 데이터 모두 삭제됩니다!')) return;
  if (!confirm('되돌릴 수 없습니다. 정말로?')) return;
  try {
    await authFetch('/api/reset', { method: 'POST' });
    localStorage.clear();
    location.reload();
  } catch(e) { alert('초기화 실패: ' + e.message); }
}
async function syncGame() {
  if (!currentUser) return;
  try {
    const info = getClassInfo(G.selectedClass, getLevel());
    const res = await authFetch('/api/sync', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
      gameState: G,
      combatPower: getCombatPower(), level: getLevel(), stage: G.classStages ? G.classStages[G.selectedClass] || 1 : G.stage,
      knightStage: G.classStages ? G.classStages.knight || 0 : 0,
      archerStage: G.classStages ? G.classStages.archer || 0 : 0,
      rogueStage: G.classStages ? G.classStages.rogue || 0 : 0,
      className: info.name, classStage: info.stageLabel
      })
    });
    const data = await res.json();
    if (data.serverSettings) serverSettings = data.serverSettings;
    // pending 지급 수령
    if (data.pending) {
      const p = data.pending;
      if (p.gold) { G.gold += p.gold; showFloatText(`🎁 💰+${formatNum(p.gold)} 지급!`, '#4CAF50'); }
      if (p.dia) { G.dia += p.dia; showFloatText(`🎁 💎+${formatNum(p.dia)} 지급!`, '#4CAF50'); }
      updateTopBar();
    }
    saveGame();
  } catch(e) { console.warn('Sync failed:', e); }
}
setInterval(syncGame, 5000);
window.addEventListener('beforeunload', () => {
  saveGame();
  if (currentUser) {
    const cp = getCombatPower();
    const info = getClassInfo(G.selectedClass, getLevel());
    const body = JSON.stringify({
      gameState: G,
      combatPower: cp, level: getLevel(),
      stage: Math.max(...Object.values(G.classMaxStages || {knight:1})),
      knightStage: (G.classMaxStages||{}).knight || 0,
      archerStage: (G.classMaxStages||{}).archer || 0,
      rogueStage: (G.classMaxStages||{}).rogue || 0,
      className: info.name, classStage: info.stageLabel
    });
    navigator.sendBeacon('/api/save-beacon?uid=' + userUid, new Blob([body], {type:'application/json'}));
  }
});
